<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Snake &amp; Ladder v2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fdf6e3;
      --board-bg: #fff8e7;
      --cell-even: #fffde7;
      --cell-odd: #f5f0d8;
      --border: #c8b89a;
      --text: #2c2c2c;
      --accent: #f39c12;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-text-size-adjust: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: fixed;
      width: 100%;
      height: 100%;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ===== SCREENS ===== */
    .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 16px; }
    .screen.active { display: flex; }

    /* ===== SETUP SCREEN ===== */
    #setup-screen { gap: 20px; background: linear-gradient(160deg, #fdf6e3 0%, #fce8c3 100%); }

    .setup-title { font-size: 2rem; font-weight: 800; text-align: center; line-height: 1.1; letter-spacing: -0.5px; }
    .setup-title span { display: block; font-size: 0.9rem; font-weight: 500; color: #888; margin-top: 4px; }

    .player-card { background: #fff; border-radius: var(--radius); padding: 16px; width: 100%; max-width: 360px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); display: flex; flex-direction: column; gap: 12px; }
    .player-card-header { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #999; }
    .player-card-row { display: flex; gap: 10px; align-items: center; }

    .player-card input[type="text"] { flex: 1; border: 2px solid #e0e0e0; border-radius: 8px; padding: 10px 12px; font-size: 1rem; font-family: var(--font); outline: none; transition: border-color 0.2s; }
    .player-card input[type="text"]:focus { border-color: var(--accent); }

    .color-picker-wrap { position: relative; width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 3px solid #e0e0e0; flex-shrink: 0; }
    .color-picker-wrap input[type="color"] { position: absolute; top: -8px; left: -8px; width: 60px; height: 60px; border: none; padding: 0; cursor: pointer; }
    .color-preview { position: absolute; inset: 0; pointer-events: none; border-radius: 50%; }

    #start-btn { width: 100%; max-width: 360px; padding: 16px; font-size: 1.1rem; font-weight: 700; color: #fff; background: linear-gradient(135deg, #f39c12, #e67e22); border: none; border-radius: 50px; cursor: pointer; touch-action: manipulation; box-shadow: 0 4px 16px rgba(243,156,18,0.4); transition: transform 0.1s; }
    #start-btn:active { transform: scale(0.97); }

    /* ===== GAME SCREEN ===== */
    #game-screen { padding: 8px 6px 8px 6px; justify-content: flex-start; gap: 0; background: var(--bg); }

    #players-bar { display: flex; gap: 8px; width: 100%; margin-bottom: 6px; }

    .player-info { flex: 1; background: #fff; border-radius: 10px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; border: 2px solid transparent; transition: border-color 0.3s, box-shadow 0.3s; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
    .player-info.active-turn { border-color: var(--player-dot-color); box-shadow: 0 0 0 3px color-mix(in srgb, var(--player-dot-color) 20%, transparent); }

    .player-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--player-dot-color); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .player-details { flex: 1; overflow: hidden; }
    .player-name-display { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-pos-display { font-size: 0.68rem; color: #888; }

    /* ===== BOARD ===== */
    #board-wrap { width: 100%; display: flex; justify-content: center; flex: 1; min-height: 0; }

    #board-container {
      position: relative;
      aspect-ratio: 1;
      width: min(calc(100vw - 12px), calc(100vh - 230px));
      border: 2px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      flex-shrink: 0;
      background: var(--board-bg);
    }

    #board { position: absolute; inset: 0; display: grid; grid-template-columns: repeat(10, 1fr); }

    #board-svg { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }

    #tokens-layer { position: absolute; inset: 0; pointer-events: none; }

    .cell { position: relative; border: 0.5px solid rgba(0,0,0,0.07); background: var(--cell-even); }
    .cell:nth-child(odd) { background: var(--cell-odd); }
    .cell.snake-start { background: rgba(192,57,43,0.10) !important; }
    .cell.ladder-start { background: rgba(180,130,30,0.12) !important; }
    .cell.square-100 { background: linear-gradient(135deg, #ffd700, #ffec6e) !important; }

    .cell-num { position: absolute; top: 1px; left: 2px; font-size: clamp(0.38rem, 2vw, 0.56rem); font-weight: 600; color: rgba(0,0,0,0.4); line-height: 1; pointer-events: none; }

    /* ===== TOKENS ===== */
    .token {
      position: absolute;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 800;
      font-size: clamp(0.38rem, 1.8vw, 0.55rem);
      box-shadow: 0 2px 6px rgba(0,0,0,0.45);
      width: clamp(14px, 4.5vw, 22px);
      height: clamp(14px, 4.5vw, 22px);
      border: 2px solid rgba(255,255,255,0.9);
      transform: translate(-50%, -50%);
      z-index: 20;
      pointer-events: none;
    }

    @keyframes token-land {
      0%   { transform: translate(-50%, -60%) scale(1.4); }
      60%  { transform: translate(-50%, -45%) scale(0.95); }
      100% { transform: translate(-50%, -50%) scale(1); }
    }
    .token-landing { animation: token-land 0.35s ease-out forwards; }

    /* ===== CONTROLS ===== */
    #controls { width: 100%; display: flex; flex-direction: column; gap: 5px; margin-top: 5px; }

    #legend { display: flex; gap: 14px; justify-content: center; font-size: 0.68rem; color: #888; }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-snake { width: 18px; height: 5px; border-radius: 3px; background: linear-gradient(90deg, #c0392b, #27ae60); }
    .legend-ladder { width: 18px; height: 5px; border-radius: 2px; background: #8B5E3C; }

    #status-msg { text-align: center; font-size: 0.78rem; font-weight: 600; color: #555; min-height: 18px; line-height: 1.3; padding: 0 4px; }

    #dice-row { display: flex; align-items: center; gap: 12px; }

    #dice-display { width: 52px; height: 52px; background: #fff; border: 2px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 900; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
    #dice-display.rolling { animation: dice-shake 0.5s ease; }

    @keyframes dice-shake {
      0%   { transform: rotate(0deg) scale(1); }
      15%  { transform: rotate(-18deg) scale(1.15); }
      30%  { transform: rotate(18deg) scale(1.2); }
      45%  { transform: rotate(-12deg) scale(1.15); }
      60%  { transform: rotate(12deg) scale(1.1); }
      80%  { transform: rotate(-5deg) scale(1.05); }
      100% { transform: rotate(0deg) scale(1); }
    }

    #roll-btn { flex: 1; height: 52px; font-size: 1rem; font-weight: 700; color: #fff; background: linear-gradient(135deg, #27ae60, #2ecc71); border: none; border-radius: 50px; cursor: pointer; touch-action: manipulation; box-shadow: 0 4px 14px rgba(39,174,96,0.4); transition: transform 0.1s, opacity 0.2s; }
    #roll-btn:active:not(:disabled) { transform: scale(0.96); }
    #roll-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ===== WIN SCREEN ===== */
    #win-screen { background: linear-gradient(160deg, #fdf6e3, #fce8c3); gap: 24px; text-align: center; }
    #win-trophy { font-size: 4rem; animation: trophy-bounce 0.8s ease infinite alternate; }
    @keyframes trophy-bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    #win-title { font-size: 1.8rem; font-weight: 900; line-height: 1.1; }
    #win-subtitle { font-size: 1rem; color: #777; }
    #win-banner { padding: 16px 28px; border-radius: 60px; font-size: 1.3rem; font-weight: 800; color: #fff; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    #play-again-btn { padding: 16px 40px; font-size: 1.1rem; font-weight: 700; color: #fff; background: linear-gradient(135deg, #f39c12, #e67e22); border: none; border-radius: 50px; cursor: pointer; touch-action: manipulation; box-shadow: 0 4px 16px rgba(243,156,18,0.4); transition: transform 0.1s; }
    #play-again-btn:active { transform: scale(0.96); }

    /* ===== CONFETTI ===== */
    .confetti-piece { position: fixed; width: 8px; height: 8px; border-radius: 2px; top: -10px; animation: confetti-fall linear forwards; pointer-events: none; z-index: 999; }
    @keyframes confetti-fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>

  <!-- SETUP SCREEN -->
  <div id="setup-screen" class="screen active">
    <div class="setup-title">
      🐍 Snake &amp; Ladder 🪜
      <span>2 players · 100 squares · d12 dice</span>
    </div>
    <div class="player-card">
      <div class="player-card-header">Player 1</div>
      <div class="player-card-row">
        <input type="text" id="p1-name" placeholder="Enter name" value="Player 1" maxlength="14">
        <div class="color-picker-wrap">
          <input type="color" id="p1-color" value="#e74c3c">
          <div class="color-preview" id="p1-preview" style="background:#e74c3c"></div>
        </div>
      </div>
    </div>
    <div class="player-card">
      <div class="player-card-header">Player 2</div>
      <div class="player-card-row">
        <input type="text" id="p2-name" placeholder="Enter name" value="Player 2" maxlength="14">
        <div class="color-picker-wrap">
          <input type="color" id="p2-color" value="#2980b9">
          <div class="color-preview" id="p2-preview" style="background:#2980b9"></div>
        </div>
      </div>
    </div>
    <button id="start-btn">Start Game 🎲</button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen" class="screen">
    <div id="players-bar">
      <div class="player-info" id="p1-info" style="--player-dot-color:#e74c3c">
        <div class="player-dot" id="p1-dot">P1</div>
        <div class="player-details">
          <div class="player-name-display" id="p1-name-display">Player 1</div>
          <div class="player-pos-display" id="p1-pos">Square: Start</div>
        </div>
      </div>
      <div class="player-info" id="p2-info" style="--player-dot-color:#2980b9">
        <div class="player-dot" id="p2-dot">P2</div>
        <div class="player-details">
          <div class="player-name-display" id="p2-name-display">Player 2</div>
          <div class="player-pos-display" id="p2-pos">Square: Start</div>
        </div>
      </div>
    </div>

    <div id="board-wrap">
      <div id="board-container">
        <div id="board"></div>
        <svg id="board-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
        <div id="tokens-layer"></div>
      </div>
    </div>

    <div id="controls">
      <div id="legend">
        <div class="legend-item"><div class="legend-snake"></div><span>Snake — slide down</span></div>
        <div class="legend-item"><div class="legend-ladder"></div><span>Ladder — climb up</span></div>
      </div>
      <div id="status-msg">Tap Roll Dice to begin!</div>
      <div id="dice-row">
        <div id="dice-display">🎲</div>
        <button id="roll-btn">Roll Dice</button>
      </div>
    </div>
  </div>

  <!-- WIN SCREEN -->
  <div id="win-screen" class="screen">
    <div id="win-trophy">🏆</div>
    <div id="win-title">We have a winner!</div>
    <div id="win-banner">Player 1 wins!</div>
    <div id="win-subtitle">Reached square 100 first</div>
    <button id="play-again-btn">Play Again</button>
  </div>

  <script>
    // ===== CONSTANTS =====
    const LADDERS = { 4:25, 13:46, 33:49, 42:63, 50:69, 59:78, 64:83, 74:92 };
    const SNAKES  = { 27:5, 40:3, 43:18, 54:31, 62:22, 76:58, 89:53, 99:41 };

    // ===== STATE =====
    const state = {
      players: [
        { name: 'Player 1', color: '#e74c3c', position: 0 },
        { name: 'Player 2', color: '#2980b9', position: 0 }
      ],
      currentPlayer: 0,
      rolling: false,
      animating: false,
      gameOver: false
    };

    // ===== COORDINATE SYSTEM =====
    // Returns {x, y} in 0–100 (SVG viewBox units = CSS %)
    function squareToXY(sq) {
      const rowFromBottom = Math.floor((sq - 1) / 10);
      const indexInRow = (sq - 1) % 10;
      const col = rowFromBottom % 2 === 0 ? indexInRow : 9 - indexInRow;
      return {
        x: (col + 0.5) * 10,
        y: (9 - rowFromBottom + 0.5) * 10
      };
    }

    // ===== SETUP SCREEN =====
    document.getElementById('p1-color').addEventListener('input', e => {
      document.getElementById('p1-preview').style.background = e.target.value;
    });
    document.getElementById('p2-color').addEventListener('input', e => {
      document.getElementById('p2-preview').style.background = e.target.value;
    });

    document.getElementById('start-btn').addEventListener('click', () => {
      const n1 = document.getElementById('p1-name').value.trim() || 'Player 1';
      const n2 = document.getElementById('p2-name').value.trim() || 'Player 2';
      const c1 = document.getElementById('p1-color').value;
      const c2 = document.getElementById('p2-color').value;
      state.players[0] = { name: n1, color: c1, position: 0 };
      state.players[1] = { name: n2, color: c2, position: 0 };
      state.currentPlayer = 0;
      state.rolling = false;
      state.animating = false;
      state.gameOver = false;
      initGame();
      showScreen('game-screen');
    });

    // ===== BUILD BOARD =====
    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      for (let domRow = 0; domRow < 10; domRow++) {
        const rowFromBottom = 9 - domRow;
        const isLTR = rowFromBottom % 2 === 0;
        const rowStart = rowFromBottom * 10 + 1;
        for (let col = 0; col < 10; col++) {
          const sq = isLTR ? rowStart + col : rowStart + 9 - col;
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.id = `cell-${sq}`;
          if (SNAKES[sq])   cell.classList.add('snake-start');
          if (LADDERS[sq])  cell.classList.add('ladder-start');
          if (sq === 100)   cell.classList.add('square-100');
          const num = document.createElement('div');
          num.className = 'cell-num';
          num.textContent = sq;
          cell.appendChild(num);
          if (sq === 100) {
            const star = document.createElement('div');
            star.style.cssText = 'position:absolute;bottom:2px;right:2px;font-size:clamp(0.5rem,2vw,0.8rem);line-height:1;';
            star.textContent = '⭐';
            cell.appendChild(star);
          }
          board.appendChild(cell);
        }
      }
    }

    // ===== DRAW SVG SNAKES & LADDERS =====
    function drawBoardSVG() {
      const svg = document.getElementById('board-svg');
      svg.innerHTML = '';
      const NS = 'http://www.w3.org/2000/svg';

      function el(tag, attrs) {
        const e = document.createElementNS(NS, tag);
        for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
        return e;
      }

      // --- LADDERS ---
      for (const [from, to] of Object.entries(LADDERS)) {
        const b = squareToXY(+from); // bottom
        const t = squareToXY(+to);   // top
        const dx = t.x - b.x, dy = t.y - b.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        // Perpendicular for rail separation
        const ox = (-dy / len) * 1.6;
        const oy = (dx / len) * 1.6;
        const g = el('g', {});

        // Shadow/depth for rails
        g.appendChild(el('line', { x1: b.x-ox+0.3, y1: b.y-oy+0.3, x2: t.x-ox+0.3, y2: t.y-oy+0.3, stroke: 'rgba(0,0,0,0.15)', 'stroke-width': '1.1', 'stroke-linecap': 'round' }));
        g.appendChild(el('line', { x1: b.x+ox+0.3, y1: b.y+oy+0.3, x2: t.x+ox+0.3, y2: t.y+oy+0.3, stroke: 'rgba(0,0,0,0.15)', 'stroke-width': '1.1', 'stroke-linecap': 'round' }));

        // Rails
        g.appendChild(el('line', { x1: b.x-ox, y1: b.y-oy, x2: t.x-ox, y2: t.y-oy, stroke: '#7a4f2e', 'stroke-width': '1.0', 'stroke-linecap': 'round' }));
        g.appendChild(el('line', { x1: b.x+ox, y1: b.y+oy, x2: t.x+ox, y2: t.y+oy, stroke: '#7a4f2e', 'stroke-width': '1.0', 'stroke-linecap': 'round' }));

        // Rungs
        const numRungs = Math.max(3, Math.ceil(len / 9));
        for (let i = 0; i <= numRungs; i++) {
          const f = i / numRungs;
          const rx = b.x + dx*f, ry = b.y + dy*f;
          g.appendChild(el('line', { x1: rx-ox, y1: ry-oy, x2: rx+ox, y2: ry+oy, stroke: '#c49a6c', 'stroke-width': '0.8', 'stroke-linecap': 'round' }));
        }

        // Gold endpoint dots
        g.appendChild(el('circle', { cx: b.x, cy: b.y, r: '1.5', fill: '#f39c12', stroke: '#e67e22', 'stroke-width': '0.4' }));
        g.appendChild(el('circle', { cx: t.x, cy: t.y, r: '1.5', fill: '#f39c12', stroke: '#e67e22', 'stroke-width': '0.4' }));
        svg.appendChild(g);
      }

      // --- SNAKES ---
      const snakeBodyColors = ['#1a6b2e','#1a5276','#6d1a1a','#4a235a','#1b4f2a','#7e5109','#154360','#3d0f0f'];
      let colorIdx = 0;
      for (const [head, tail] of Object.entries(SNAKES)) {
        const h = squareToXY(+head); // head (high square, snake starts here)
        const t = squareToXY(+tail); // tail (low square, snake ends here)
        const dx = t.x - h.x, dy = t.y - h.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        const px = -dy / len, py = dx / len;
        const amp = Math.min(len * 0.30, 13);

        // S-curve control points
        const cp1 = { x: h.x + dx*0.3 + px*amp, y: h.y + dy*0.3 + py*amp };
        const cp2 = { x: h.x + dx*0.7 - px*amp, y: h.y + dy*0.7 - py*amp };
        const d = `M${h.x},${h.y} C${cp1.x},${cp1.y} ${cp2.x},${cp2.y} ${t.x},${t.y}`;
        const bodyColor = snakeBodyColors[colorIdx % snakeBodyColors.length];
        colorIdx++;

        const g = el('g', {});

        // Shadow
        g.appendChild(el('path', { d, fill: 'none', stroke: 'rgba(0,0,0,0.18)', 'stroke-width': '3.0', 'stroke-linecap': 'round' }));

        // Body
        g.appendChild(el('path', { d, fill: 'none', stroke: bodyColor, 'stroke-width': '2.4', 'stroke-linecap': 'round' }));

        // Scale pattern (dashed highlight)
        g.appendChild(el('path', { d, fill: 'none', stroke: 'rgba(255,255,255,0.25)', 'stroke-width': '1.0', 'stroke-linecap': 'round', 'stroke-dasharray': '1.8 3.0' }));

        // Snake head (red circle)
        g.appendChild(el('circle', { cx: h.x, cy: h.y, r: '2.4', fill: '#c0392b', stroke: '#922b21', 'stroke-width': '0.5' }));

        // Eyes
        const ex = -dy / len * 0.8, ey = dx / len * 0.8;
        const bx = dx / len * 0.5, by = dy / len * 0.5;
        g.appendChild(el('circle', { cx: h.x + ex - bx, cy: h.y + ey - by, r: '0.6', fill: '#fff' }));
        g.appendChild(el('circle', { cx: h.x - ex - bx, cy: h.y - ey - by, r: '0.6', fill: '#fff' }));
        g.appendChild(el('circle', { cx: h.x + ex - bx, cy: h.y + ey - by, r: '0.25', fill: '#111' }));
        g.appendChild(el('circle', { cx: h.x - ex - bx, cy: h.y - ey - by, r: '0.25', fill: '#111' }));

        // Tail dot
        g.appendChild(el('circle', { cx: t.x, cy: t.y, r: '1.1', fill: bodyColor }));

        svg.appendChild(g);
      }
    }

    // ===== TOKENS =====
    function createTokens() {
      const layer = document.getElementById('tokens-layer');
      layer.innerHTML = '';
      state.players.forEach((p, idx) => {
        const token = document.createElement('div');
        token.className = 'token';
        token.id = `token-${idx}`;
        token.style.background = p.color;
        token.style.display = 'none';
        token.textContent = p.name.charAt(0).toUpperCase();
        layer.appendChild(token);
      });
    }

    function placeToken(idx, sq) {
      const token = document.getElementById(`token-${idx}`);
      if (!token) return;
      if (sq === 0) { token.style.display = 'none'; return; }
      token.style.display = 'flex';
      const pos = squareToXY(sq);
      const otherPos = state.players[1 - idx].position;
      const offset = (otherPos === sq) ? (idx === 0 ? -3.5 : 3.5) : 0;
      token.style.left = (pos.x + offset) + '%';
      token.style.top = pos.y + '%';
    }

    function landToken(idx, sq) {
      placeToken(idx, sq);
      const token = document.getElementById(`token-${idx}`);
      if (token) {
        token.classList.remove('token-landing');
        void token.offsetWidth;
        token.classList.add('token-landing');
        token.addEventListener('animationend', () => token.classList.remove('token-landing'), { once: true });
      }
    }

    // ===== ANIMATIONS =====

    // Step-by-step forward movement
    function animateSteps(idx, fromSq, toSq, callback) {
      const steps = [];
      for (let s = fromSq + 1; s <= toSq; s++) steps.push(s);
      if (steps.length === 0) { callback(); return; }
      let i = 0;
      function next() {
        if (i >= steps.length) { callback(); return; }
        placeToken(idx, steps[i++]);
        setTimeout(next, i < steps.length ? 90 : 150);
      }
      next();
    }

    // Step-by-step reverse movement (bounce back from 100)
    function animateStepsReverse(idx, fromSq, toSq, callback) {
      const steps = [];
      for (let s = fromSq - 1; s >= toSq; s--) steps.push(s);
      if (steps.length === 0) { callback(); return; }
      let i = 0;
      function next() {
        if (i >= steps.length) { callback(); return; }
        placeToken(idx, steps[i++]);
        setTimeout(next, 90);
      }
      next();
    }

    // Sample cubic bezier curve
    function sampleBezier(p0, cp1, cp2, p3, n) {
      const pts = [];
      for (let i = 0; i <= n; i++) {
        const t = i / n, mt = 1 - t;
        pts.push({
          x: mt*mt*mt*p0.x + 3*mt*mt*t*cp1.x + 3*mt*t*t*cp2.x + t*t*t*p3.x,
          y: mt*mt*mt*p0.y + 3*mt*mt*t*cp1.y + 3*mt*t*t*cp2.y + t*t*t*p3.y
        });
      }
      return pts;
    }

    // Smooth slide along snake (bezier) or ladder (straight)
    function animateSlide(idx, fromSq, toSq, type, callback) {
      const token = document.getElementById(`token-${idx}`);
      const p0 = squareToXY(fromSq);
      const p3 = squareToXY(toSq);
      let points;

      if (type === 'snake') {
        const dx = p3.x - p0.x, dy = p3.y - p0.y;
        const len = Math.sqrt(dx*dx + dy*dy);
        const px = -dy/len, py = dx/len;
        const amp = Math.min(len * 0.30, 13);
        const cp1 = { x: p0.x + dx*0.3 + px*amp, y: p0.y + dy*0.3 + py*amp };
        const cp2 = { x: p0.x + dx*0.7 - px*amp, y: p0.y + dy*0.7 - py*amp };
        points = sampleBezier(p0, cp1, cp2, p3, 50);
      } else {
        // Straight line for ladder
        points = [];
        for (let i = 0; i <= 50; i++) {
          const t = i / 50;
          points.push({ x: p0.x + (p3.x - p0.x)*t, y: p0.y + (p3.y - p0.y)*t });
        }
      }

      const duration = type === 'snake' ? 900 : 700;
      const startTime = performance.now();

      function easeInOut(t) { return t < 0.5 ? 2*t*t : -1 + (4 - 2*t)*t; }

      function frame(now) {
        const raw = Math.min((now - startTime) / duration, 1);
        const ease = easeInOut(raw);
        const fi = ease * (points.length - 1);
        const i0 = Math.floor(fi), i1 = Math.min(i0 + 1, points.length - 1);
        const frac = fi - i0;
        token.style.left = (points[i0].x + (points[i1].x - points[i0].x) * frac) + '%';
        token.style.top  = (points[i0].y + (points[i1].y - points[i0].y) * frac) + '%';
        if (raw < 1) {
          requestAnimationFrame(frame);
        } else {
          landToken(idx, toSq);
          callback();
        }
      }
      requestAnimationFrame(frame);
    }

    // ===== PLAYER BAR =====
    function updatePlayersBar() {
      state.players.forEach((p, idx) => {
        const i = idx + 1;
        const dot = document.getElementById(`p${i}-dot`);
        dot.style.background = p.color;
        dot.textContent = p.name.charAt(0).toUpperCase();
        document.getElementById(`p${i}-name-display`).textContent = p.name;
        document.getElementById(`p${i}-info`).style.setProperty('--player-dot-color', p.color);
        document.getElementById(`p${i}-pos`).textContent = p.position === 0 ? 'Square: Start' : `Square: ${p.position}`;
        const infoEl = document.getElementById(`p${i}-info`);
        infoEl.classList.toggle('active-turn', idx === state.currentPlayer && !state.gameOver);
      });
    }

    // ===== ROLL BUTTON =====
    document.getElementById('roll-btn').addEventListener('click', () => {
      if (state.rolling || state.animating || state.gameOver) return;
      state.rolling = true;
      document.getElementById('roll-btn').disabled = true;

      const diceEl = document.getElementById('dice-display');
      diceEl.classList.remove('rolling');
      void diceEl.offsetWidth;
      diceEl.classList.add('rolling');

      let ticks = 0;
      const interval = setInterval(() => {
        diceEl.textContent = Math.floor(Math.random() * 12) + 1;
        if (++ticks >= 8) {
          clearInterval(interval);
          const roll = Math.floor(Math.random() * 12) + 1;
          diceEl.textContent = roll;
          diceEl.classList.remove('rolling');
          setTimeout(() => doMove(roll), 150);
        }
      }, 60);
    });

    // ===== MOVE LOGIC =====
    function doMove(roll) {
      state.animating = true;
      const idx = state.currentPlayer;
      const p = state.players[idx];
      const fromSq = p.position;
      const rawLand = fromSq + roll;
      const bounced = rawLand > 100;
      const landSq = bounced ? 200 - rawLand : rawLand;
      const name = p.name;

      setStatus(`${name} rolled ${roll}…`);

      function afterLand() {
        state.players[idx].position = landSq;
        updatePlayersBar();

        if (landSq === 100) {
          state.animating = false;
          setTimeout(() => triggerWin(idx), 300);
          return;
        }

        if (LADDERS[landSq] !== undefined) {
          const dest = LADDERS[landSq];
          setStatus(`${name} rolled ${roll} — 🪜 Ladder! ${landSq} → ${dest}`);
          setTimeout(() => animateSlide(idx, landSq, dest, 'ladder', () => {
            state.players[idx].position = dest;
            updatePlayersBar();
            finishTurn(idx, name, roll, ` 🪜 Ladder to ${dest}`);
          }), 250);
        } else if (SNAKES[landSq] !== undefined) {
          const dest = SNAKES[landSq];
          setStatus(`${name} rolled ${roll} — 🐍 Snake! ${landSq} → ${dest}`);
          setTimeout(() => animateSlide(idx, landSq, dest, 'snake', () => {
            state.players[idx].position = dest;
            updatePlayersBar();
            finishTurn(idx, name, roll, ` 🐍 Snake to ${dest}`);
          }), 250);
        } else {
          if (bounced) setStatus(`${name} rolled ${roll} — bounced to ${landSq}!`);
          finishTurn(idx, name, roll, bounced ? ` (bounced to ${landSq})` : '');
        }
      }

      if (bounced) {
        // Animate to 100, then bounce back
        animateSteps(idx, fromSq, 100, () => {
          setTimeout(() => animateStepsReverse(idx, 100, landSq, afterLand), 150);
        });
      } else {
        animateSteps(idx, fromSq, landSq, afterLand);
      }
    }

    function finishTurn(idx, name, roll, extra) {
      state.currentPlayer = 1 - idx;
      state.rolling = false;
      state.animating = false;
      document.getElementById('roll-btn').disabled = false;
      updatePlayersBar();
      const next = state.players[state.currentPlayer].name;
      setStatus(`${name} rolled ${roll}${extra}. ${next}'s turn!`);
    }

    // ===== WIN =====
    function triggerWin(playerIdx) {
      state.gameOver = true;
      document.getElementById('roll-btn').disabled = true;
      const p = state.players[playerIdx];
      document.getElementById('win-banner').textContent = `${p.name} wins! 🎉`;
      document.getElementById('win-banner').style.background = p.color;
      spawnConfetti();
      showScreen('win-screen');
    }

    function spawnConfetti() {
      const colors = ['#e74c3c','#f39c12','#2ecc71','#3498db','#9b59b6','#1abc9c','#e67e22'];
      for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = `${Math.random()*100}vw`;
        el.style.background = colors[Math.floor(Math.random()*colors.length)];
        el.style.animationDuration = `${1.5 + Math.random()*2}s`;
        el.style.animationDelay = `${Math.random()*0.8}s`;
        el.style.width = `${6 + Math.random()*6}px`;
        el.style.height = `${6 + Math.random()*6}px`;
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    // ===== PLAY AGAIN =====
    document.getElementById('play-again-btn').addEventListener('click', () => showScreen('setup-screen'));

    // ===== HELPERS =====
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }
    function setStatus(msg) {
      document.getElementById('status-msg').textContent = msg;
    }

    function initGame() {
      buildBoard();
      drawBoardSVG();
      createTokens();
      updatePlayersBar();
      document.getElementById('roll-btn').disabled = false;
      document.getElementById('dice-display').textContent = '🎲';
      setStatus(`${state.players[0].name} goes first — tap Roll Dice!`);
    }
  </script>
</body>
</html>
